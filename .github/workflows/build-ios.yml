name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Capacitor iOS
      run: npm install @capacitor/ios
      
    - name: Add iOS Platform
      run: npx cap add ios
      continue-on-error: true
      
    - name: Sync Capacitor
      run: npx cap sync
      
    - name: Check iOS setup
      run: |
        echo "=== ios/App contents ==="
        ls -la ios/App/
        echo "=== Checking for Podfile ==="
        find ios -name "Podfile" -o -name "*.xcworkspace" 2>/dev/null || echo "No Podfile found"
        if [ ! -f "ios/App/Podfile" ]; then
          echo "Podfile not found, this project uses SPM (Swift Package Manager)"
          echo "Skipping CocoaPods installation"
        fi
      
    - name: Install CocoaPods (if needed)
      run: |
        if [ -f "ios/App/Podfile" ]; then
          cd ios/App
          pod install --verbose
        else
          echo "No Podfile found, skipping CocoaPods (using SPM)"
        fi
      
    - name: Build iOS Project
      run: |
        cd ios/App
        if [ -f "App.xcworkspace" ]; then
          xcodebuild -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS' -configuration Release CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
        else
          xcodebuild -project App.xcodeproj -scheme App -destination 'generic/platform=iOS' -configuration Release CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
        fi
        cat build.log
      
    - name: Export IPA (unsigned)
      run: |
        cd ios/App
        mkdir -p Payload
        if [ -d "build/Release-iphoneos/App.app" ]; then
          cp -r build/Release-iphoneos/App.app Payload/
        elif [ -d "build/Release-iphoneos/Eagle Phone POS.app" ]; then
          cp -r "build/Release-iphoneos/Eagle Phone POS.app" Payload/App.app
        fi
        zip -r ../../EaglePhonePOS.ipa Payload
        rm -rf Payload
      
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: EaglePhonePOS-IPA
        path: EaglePhonePOS.ipa
        retention-days: 30
